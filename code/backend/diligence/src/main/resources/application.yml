spring:
    application:
        name: diligence

    datasource:
        url: jdbc:mysql://localhost:3306/diligence
        username: root
        password: 135246qq
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
            maximum-pool-size: 10
            minimum-idle: 5
            idle-timeout: 30000

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true

server:
    port: 8080
    servlet:
        context-path: /
        session:
            timeout: 30m
            cookie:
                http-only: true
                secure: false


logging:
    level:
        org.edocsitahw.spa: INFO
        org.springframework.security: DEBUG