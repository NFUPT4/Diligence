<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 致勤考勤系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "Helvetica Neue", Arial, sans-serif;
        }

        html, body {
            height: 100%;
            background-color: #f0f2f5;
        }

        /* 整体布局 */
        .layout {
            display: flex;
            height: 100vh;
        }

        /* 左侧侧边栏 */
        .sidebar {
            width: 240px;
            background-color: #ffffff;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .logo-area {
            padding: 0 20px 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d6a4f;
        }

        .logo-subtitle {
            font-size: 12px;
            color: #999;
        }

        .nav-menu {
            flex: 1;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            color: #666;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background-color: #f5f7fa;
            color: #333;
        }

        .nav-item.active {
            background-color: #e8f0f7;
            color: #2d6a4f;
            font-weight: 500;
        }

        .nav-icon {
            font-size: 18px;
        }

        .user-footer {
            padding: 16px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #e8f0f7;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .user-dept {
            font-size: 12px;
            color: #999;
        }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #666;
        }

        /* 统计卡片行 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .stat-desc {
            font-size: 13px;
            color: #4096ff;
        }

        /* 功能模块区 */
        .modules-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .module-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .module-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .module-tag {
            background-color: #fff7e6;
            color: #d48806;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .punch-bar {
            height: 48px;
            background-color: #f0f2f5;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .punch-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #2d6a4f;
        }

        /* 底部功能入口 */
        .entries-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .entry-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .entry-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .entry-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            margin: 0 auto 16px;
        }

        .entry-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .entry-desc {
            font-size: 12px;
            color: #999;
        }

        /* 图表区 */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .chart-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .chart-more {
            font-size: 20px;
            color: #999;
            cursor: pointer;
        }

        .chart-placeholder {
            height: 120px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #4096ff 0%, #e6f0ff 100%);
            border-radius: 4px 4px 0 0;
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- 左侧侧边栏 -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">⏰</div>
                <div class="logo-text">
                    <div class="logo-title">致勤</div>
                    <div class="logo-subtitle">勤能致远</div>
                </div>
            </div>

            <nav class="nav-menu">
                <div class="nav-item active">
                    <span class="nav-icon">📈</span>
                    <span>首页面板</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span>我的考勤</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>数据查看</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>系统管理</span>
                </div>
            </nav>

            <div class="user-footer">
                <div class="user-avatar">👤</div>
                <div class="user-info">
                    <div class="user-name">管理员</div>
                    <div class="user-dept">0</div>
                </div>
            </div>
        </aside>

        <!-- 右侧主内容 -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="welcome-title">欢迎回来，管理员 👋</h1>
            </div>

            <!-- 顶部统计卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">
                        <span>📅</span>
                        <span>今日考勤状态</span>
                    </div>
                    <div class="stat-value">已完成</div>
                    <div class="stat-desc">上班</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">
                        <span>📉</span>
                        <span>本月考勤率</span>
                    </div>
                    <div class="stat-value" style="font-size: 24px; color: #666;"></div>
                    <div class="stat-desc">部门平均 ·</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">
                        <span>📋</span>
                        <span>待处理审批</span>
                    </div>
                    <div class="stat-value" style="font-size: 24px; color: #666;"></div>
                    <div class="stat-desc">需及时处理</div>
                </div>
            </div>

            <!-- 中间功能模块 -->
            <div class="modules-grid">
                <div class="module-card">
                    <div class="module-header">
                        <div class="module-title">
                            <span>📍</span>
                            <span>智能打卡</span>
                        </div>
                        <span class="module-tag">GPS验证</span>
                    </div>
                    <div class="punch-bar">
                        <div class="punch-dot"></div>
                    </div>
                </div>
                <div class="module-card">
                    <div class="module-header">
                        <div class="module-title">
                            <span>📋</span>
                            <span>待审批申请</span>
                        </div>
                        <span class="module-tag">待处理</span>
                    </div>
                </div>
            </div>

            <!-- 功能入口 -->
            <div class="entries-grid">
                <div class="entry-card">
                    <div class="entry-icon">➕</div>
                    <div class="entry-title">考勤申请</div>
                    <div class="entry-desc">请假/加班/补卡</div>
                </div>
                <div class="entry-card">
                    <div class="entry-icon">📊</div>
                    <div class="entry-title">个人考勤记录</div>
                    <div class="entry-desc">日历/列表视图</div>
                </div>
                <div class="entry-card">
                    <div class="entry-icon">🎛️</div>
                    <div class="entry-title">部门考勤报表</div>
                    <div class="entry-desc">团队出勤率</div>
                </div>
                <div class="entry-card">
                    <div class="entry-icon">⚙️</div>
                    <div class="entry-title">组织架构</div>
                    <div class="entry-desc">部门/岗位管理</div>
                </div>
            </div>

            <!-- 底部图表区 -->
            <div class="chart-row">
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">📊 月度考勤趋势</div>
                        <div class="chart-more">···</div>
                    </div>
                    <div class="chart-placeholder">
                        <div class="chart-bar" style="height: 60%;"></div>
                        <div class="chart-bar" style="height: 80%;"></div>
                        <div class="chart-bar" style="height: 45%;"></div>
                        <div class="chart-bar" style="height: 90%;"></div>
                        <div class="chart-bar" style="height: 70%;"></div>
                        <div class="chart-bar" style="height: 85%;"></div>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">📢 系统公告</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
