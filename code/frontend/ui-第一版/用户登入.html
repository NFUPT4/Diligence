<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业考勤系统登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "Helvetica Neue", Arial, sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            background: linear-gradient(180deg, #2b65d9 0%, #58a1ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
            position: relative;
        }

        /* 背景装饰元素 */
        body::before, body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: -1;
        }

        body::before {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 200px;
            height: 200px;
            bottom: -80px;
            left: -80px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            flex: 0 0 auto;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2b65d9 0%, #58a1ff 100%);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 36px;
        }

        .system-title {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .system-subtitle {
            font-size: 18px;
            color: #666;
            font-weight: 400;
        }

        .divider-line {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #999;
        }

        .divider-line::before, .divider-line::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #e0e0e0;
        }

        .divider-line span {
            padding: 0 16px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 18px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            height: 56px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 0 16px 0 48px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            background-color: #f5f7fa;
        }

        .form-input:focus {
            border-color: #2b65d9;
        }

        .form-input.error {
            border-color: #ff4d4f;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 20px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            cursor: pointer;
            font-size: 20px;
        }

        .error-text {
            color: #ff4d4f;
            font-size: 14px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .error-text::before {
            content: "ⓘ";
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            font-size: 16px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            height: 56px;
            background-color: #1e47b8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #163a99;
        }

        .forgot-password {
            text-align: center;
            margin-top: 24px;
            font-size: 15px;
            color: #666;
        }

        .forgot-password a {
            color: #2b65d9;
            text-decoration: none;
            font-weight: 500;
        }

        /* 固定在最底部的页脚 */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">
                <span>✓</span>
            </div>
            <h1 class="system-title">企业考勤系统</h1>
            <p class="system-subtitle">Employee Attendance Management</p>
        </div>

        <div class="divider-line">
            <span>账号登录</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">员工工号</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" class="form-input" id="workId" placeholder="请输入员工工号">
                </div>
                <div class="error-text" id="workIdError" style="display: none;">工号不能为空</div>
            </div>

            <div class="form-group">
                <label class="form-label">登录密码</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" class="form-input" id="password" placeholder="请输入登录密码">
                    <span class="toggle-password" id="togglePassword">👁</span>
                </div>
                <div class="error-text" id="passwordError" style="display: none;">密码不能为空</div>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">记住登录状态</label>
            </div>

            <button type="submit" class="login-btn">登录</button>
        </form>

        <div class="forgot-password">
            如忘记密码，请联系 <a href="#">系统管理员</a> 重置
        </div>
    </div>

    <!-- 固定在最底部的页脚 -->
    <div class="footer">
        v1.0.0 © 2024 勤致考勤系统
    </div>

    <script>
        // 密码显示/隐藏切换
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? '👁' : '🙈';
        });

        // 表单验证逻辑
        const loginForm = document.getElementById('loginForm');
        const workIdInput = document.getElementById('workId');
        const passwordInputForm = document.getElementById('password');
        const workIdError = document.getElementById('workIdError');
        const passwordError = document.getElementById('passwordError');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;

            // 验证工号
            if (!workIdInput.value.trim()) {
                workIdInput.classList.add('error');
                workIdError.style.display = 'block';
                isValid = false;
            } else {
                workIdInput.classList.remove('error');
                workIdError.style.display = 'none';
            }

            // 验证密码
            if (!passwordInputForm.value.trim()) {
                passwordInputForm.classList.add('error');
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordInputForm.classList.remove('error');
                passwordError.style.display = 'none';
            }

            if (isValid) {
                alert('登录验证通过！');
            }
        });

        // 输入时移除错误状态
        workIdInput.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
                workIdError.style.display = 'none';
            }
        });

        passwordInputForm.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
                passwordError.style.display = 'none';
            }
        });
    </script>
</body>
</html>
