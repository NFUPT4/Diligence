<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 勤致考勤系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:linear-gradient(180deg,#2b65d9,#58a1ff);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start;}
        .container{max-width:800px;width:100%;margin-top:20px;}

        .card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 10px 40px rgba(0,0,0,0.1);margin-bottom:20px;}
        .card-title{font-size:24px;font-weight:600;margin-bottom:24px;color:#1a1a1a;}
        
        .welcome{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
        .welcome-text h2{font-size:22px;color:#333;margin-bottom:6px;}
        .welcome-text p{color:#666;font-size:14px;}
        .user-info{text-align:right;}
        .user-name{font-size:16px;font-weight:500;color:#2b65d9;}
        .user-dept{font-size:14px;color:#666;}

        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:20px;}
        .item{background:#f7f9fc;border-radius:12px;padding:24px;text-align:center;cursor:pointer;}
        .item:hover{background:#e6f0ff;}
        .item-icon{font-size:30px;margin-bottom:10px;color:#2b65d9;}
        .item-text{font-size:16px;font-weight:500;color:#333;}

        .nav{display:flex;gap:12px;margin-top:20px;}
        .nav-btn{flex:1;background:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;color:#2b65d9;cursor:pointer;}
        .nav-btn.active{background:#2b65d9;color:#fff;}
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="welcome">
            <div class="welcome-text">
                <h2>欢迎使用勤致考勤系统</h2>
                <p>今天是 2026年04月03日 星期三</p>
            </div>
            <div class="user-info">
                <div class="user-name">张三</div>
                <div class="user-dept">技术部 · 员工</div>
            </div>
        </div>

        <div class="card-title">常用功能</div>
        <div class="grid">
            <div class="item">
                <div class="item-icon">📌</div>
                <div class="item-text">打卡签到</div>
            </div>
            <div class="item">
                <div class="item-icon">📅</div>
                <div class="item-text">我的考勤</div>
            </div>
            <div class="item">
                <div class="item-icon">📝</div>
                <div class="item-text">请假/补卡申请</div>
            </div>
            <div class="item">
                <div class="item-icon">📊</div>
                <div class="item-text">考勤数据</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active">首页</button>
        <button class="nav-btn">我的考勤</button>
        <button class="nav-btn">申请</button>
        <button class="nav-btn">数据查看</button>
        <button class="nav-btn">我的</button>
    </div>
</div>
</body>
</html>
