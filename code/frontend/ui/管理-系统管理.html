<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理 - 勤致考勤系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter', sans-serif;}
        body{background:#f1f5f9;min-height:100vh;display:flex;}

        /* 顶部提示框样式 */
        .toast{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            background:#2d6a4f;
            color:white;
            padding:16px 32px;
            border-radius:12px;
            font-size:15px;
            font-weight:500;
            box-shadow:0 4px 16px rgba(45,106,79,0.3);
            z-index:9999;
            display:none;
            animation:fadeIn 0.3s ease;
        }
        @keyframes fadeIn{
            from{opacity:0;top:0;}
            to{opacity:1;top:20px;}
        }

        /* 左侧侧边栏 - 100%匹配图片样式 */
        .sidebar{width:280px;background:#fff;height:100vh;position:fixed;left:0;top:0;box-shadow:2px 0 12px rgba(0,0,0,0.03);display:flex;flex-direction:column;justify-content:space-between;border-radius:0 24px 24px 0;}
        .logo{padding:32px 28px;border-bottom:1px solid #f0f2f5;display:flex;align-items:center;gap:14px;}
        .logo-icon{width:56px;height:56px;background:#2d6a4f;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;}
        .logo-text h1{font-size:2.2rem;font-weight:700;color:#2d6a4f;}
        .logo-text p{font-size:1rem;color:#64748b;margin-top:2px;}
        .nav-menu{margin-top:24px;flex:1;padding:0 16px;}
        .nav-item{display:flex;align-items:center;gap:14px;padding:16px 20px;color:#475569;text-decoration:none;font-size:1.25rem;transition:0.2s;cursor:pointer;border-radius:20px;margin-bottom:8px;}
        .nav-item:hover{background:#f8fafc;color:#334155;}
        .nav-item.active{background:#e9f5ef;color:#2d6a4f;font-weight:600;}
        .nav-item i{font-size:1.5rem;width:28px;text-align:center;}
        .user-info{padding:24px 28px;border-top:1px solid #f0f2f5;display:flex;align-items:center;gap:14px;margin:16px;border-radius:24px;background:#f8fafc;}
        .user-avatar{width:56px;height:56px;border-radius:50%;background:#e9f5ef;display:flex;align-items:center;justify-content:center;color:#2d6a4f;font-size:20px;font-weight:600;}
        .user-name{font-size:1.25rem;color:#1e293b;font-weight:600;}
        .user-role{font-size:0.95rem;color:#64748b;margin-top:4px;}

        /* 主内容区 */
        .main{margin-left:280px;flex:1;padding:32px 40px;}
        .page-header{margin-bottom:40px;}
        .page-title{font-size:2.2rem;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:12px;}
        .page-subtitle{font-size:1rem;color:#64748b;margin-top:8px;}

        /* 主卡片 */
        .card{background:#fff;border-radius:32px;padding:40px;box-shadow:0 8px 20px rgba(0,0,0,0.02);border:1px solid #ecfdf5;}
        .card-title{font-size:1.5rem;font-weight:600;margin-bottom:32px;color:#0f172a;display:flex;align-items:center;gap:10px;}

        /* 系统管理功能按钮组 */
        .function-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;}
        .func-btn{
            background:#fff;
            border:2px solid #e2e8f0;
            border-radius:24px;
            padding:32px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:16px;
            cursor:pointer;
            transition:all 0.3s ease;
            text-align:center;
        }
        .func-btn:hover{
            border-color:#2d6a4f;
            box-shadow:0 8px 24px rgba(45,106,79,0.1);
            transform:translateY(-4px);
        }
        .func-btn i{
            font-size:3rem;
            color:#2d6a4f;
        }
        .func-btn span{
            font-size:1.25rem;
            font-weight:600;
            color:#1e293b;
        }
        .func-btn p{
            font-size:0.9rem;
            color:#64748b;
            margin-top:4px;
        }

        /* 适配小屏 */
        @media(max-width:1024px){
            .sidebar{width:220px;}
            .main{margin-left:220px;padding:24px;}
            .function-buttons{grid-template-columns:1fr;}
        }
        @media(max-width:768px){
            .sidebar{width:70px;padding:0 8px;}
            .logo-text,.nav-item span,.user-name,.user-role{display:none;}
            .logo{padding:20px 8px;justify-content:center;}
            .logo-icon{width:40px;height:40px;font-size:18px;}
            .nav-item{justify-content:center;padding:16px 8px;}
            .user-info{justify-content:center;padding:16px 8px;margin:8px;}
            .user-avatar{width:40px;height:40px;font-size:16px;}
            .main{margin-left:70px;padding:16px;}
            .page-title{font-size:1.8rem;}
        }
    </style>
</head>
<body>
    <!-- 顶部提示框 -->
    <div class="toast" id="toast"></div>

    <!-- 左侧侧边栏 - 完全匹配图片 -->
    <div class="sidebar">
        <div>
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-clock"></i></div>
                <div class="logo-text">
                    <h1>勤致</h1>
                    <p>智能考勤 · 致远合规</p>
                </div>
            </div>
            <div class="nav-menu">
                <div class="nav-item" onclick="location.href='index.html'">
                    <i class="fas fa-chart-line"></i>
                    <span>首页仪表板</span>
                </div>
                <div class="nav-item" onclick="location.href='my-attendance.html'">
                    <i class="fas fa-user-check"></i>
                    <span>我的考勤</span>
                </div>
                <div class="nav-item" onclick="location.href='data.html'">
                    <i class="fas fa-list"></i>
                    <span>数据查看</span>
                </div>
                <div class="nav-item active">
                    <i class="fas fa-cog"></i>
                    <span>系统管理</span>
                </div>
            </div>
        </div>
        <div class="user-info">
            <div class="user-avatar"><i class="fas fa-user"></i></div>
            <div>
                <div class="user-name">张明远 · 产品部</div>
                <div class="user-role">普通员工 · 在线</div>
            </div>
        </div>
    </div>

    <!-- 主内容区 - 重写后的系统管理页面 -->
    <div class="main">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-cog"></i> 系统管理</h1>
            <p class="page-subtitle">配置考勤系统核心规则，管理员工账号与组织架构信息</p>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-sliders-h"></i> 系统核心配置</div>
            
            <!-- 三个功能按钮 -->
            <div class="function-buttons">
                <div class="func-btn" onclick="showToast('跳转到考勤规则配置页面（演示）')">
                    <i class="fas fa-calendar-check"></i>
                    <span>考勤规则配置</span>
                    <p>设置上下班时间、弹性打卡、迟到早退规则</p>
                </div>
                <div class="func-btn" onclick="showToast('跳转到员工账号管理页面（演示）')">
                    <i class="fas fa-users-cog"></i>
                    <span>员工账号管理</span>
                    <p>新增、编辑、禁用员工账号，重置密码</p>
                </div>
                <div class="func-btn" onclick="showToast('跳转到组织架构维护页面（演示）')">
                    <i class="fas fa-sitemap"></i>
                    <span>组织架构维护</span>
                    <p>管理部门与岗位，调整组织层级关系</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 顶部提示框函数
        function showToast(message){
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // 侧边栏导航切换激活状态
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
