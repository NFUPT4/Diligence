<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>勤致 · 智能考勤系统 | 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 登录卡片容器 */
        .login-container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0,0,0,0.02);
            padding: 40px 32px 44px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* 品牌区域 */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: #2d6a4f;
            margin: 0 auto 16px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 18px -8px rgba(45, 106, 79, 0.3);
        }
        .logo-icon i {
            font-size: 32px;
            color: white;
        }
        .brand h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f5e3f, #2d6a4f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .brand p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 6px;
        }

        /* 表单样式 */
        .input-group {
            margin-bottom: 24px;
        }
        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #1e293b;
        }
        .input-field {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: #ffffff;
            outline: none;
        }
        .input-field:focus {
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }
        /* 密码框附加图标 */
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8b9ab0;
            cursor: pointer;
            font-size: 1rem;
        }
        /* 选项行 (记住我 + 忘记密码) */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0 28px;
            font-size: 0.85rem;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #334155;
        }
        .checkbox input {
            width: 16px;
            height: 16px;
            accent-color: #2d6a4f;
            cursor: pointer;
        }
        .forgot-link {
            color: #2d6a4f;
            text-decoration: none;
            font-weight: 500;
        }
        /* 登录按钮 */
        .login-btn {
            width: 100%;
            background: #2d6a4f;
            border: none;
            padding: 16px;
            border-radius: 44px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 14px rgba(45, 106, 79, 0.25);
        }
        .login-btn:hover {
            background: #235c44;
            transform: translateY(-1px);
        }
        /* 错误提示框 */
        .error-message {
            background: #fff1f0;
            border-left: 4px solid #e53e3e;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: #c53030;
        }
        .error-message i {
            font-size: 1rem;
        }
        .hidden {
            display: none;
        }

        /* 附加信息：版本/版权 */
        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 0.7rem;
            color: #8ba0bc;
        }

        /* 响应式微调 */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 36px;
                border-radius: 40px;
            }
            .brand h1 {
                font-size: 1.8rem;
            }
        }

        /* 模拟简单动画 */
        .shake {
            animation: shakeEffect 0.3s ease-in-out 0s 2;
        }
        @keyframes shakeEffect {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <!-- 品牌标识 -->
        <div class="brand">
            <div class="logo-icon">
                <i class="fas fa-clock"></i>
            </div>
            <h1>勤致</h1>
            <p>员工考勤管理系统 · 智能位置验证</p>
        </div>

        <!-- 错误提示框 (默认隐藏，演示时可通过js模拟) -->
        <div id="errorBox" class="error-message hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">工号或密码错误，请重试</span>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" action="javascript:void(0);">
            <div class="input-group">
                <label class="input-label">工号</label>
                <input type="text" id="empNo" class="input-field" placeholder="请输入 6-20 位工号" autocomplete="off" value="10086">
            </div>
            <div class="input-group">
                <label class="input-label">密码</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="input-field" placeholder="请输入密码" value="123456">
                    <button type="button" class="toggle-password" id="togglePwd">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            <div class="options-row">
                <label class="checkbox">
                    <input type="checkbox" id="rememberMe"> 记住我
                </label>
                <a href="#" class="forgot-link">忘记密码？</a>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> 登录系统
            </button>
        </form>
        <div class="footer-note">
            © 2026 勤致 · 工学院  |  安全加密登录
        </div>
    </div>
</div>

<script>
    // 演示交互：密码显示/隐藏、登录校验模拟（根据需求展示错误/成功跳转）
    const toggleBtn = document.getElementById('togglePwd');
    const pwdInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');
    const empNoInput = document.getElementById('empNo');
    const errorBox = document.getElementById('errorBox');
    const errorTextSpan = document.getElementById('errorText');
    const rememberCheck = document.getElementById('rememberMe');

    // 切换密码可见性
    toggleBtn.addEventListener('click', function() {
        const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
        pwdInput.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
    });

    // 演示登录验证逻辑 (符合需求文档: 工号密码校验、错误提示、账号锁定演示)
    // 模拟正确的账号：工号 10086 / 密码 123456 (管理员) ; 工号 10010 / 密码 123456 (普通员工)
    // 可根据需求展示禁用账号等场景
    const validUsers = {
        '10086': { pwd: '123456', role: 'admin', status: 1 },
        '10010': { pwd: '123456', role: 'employee', status: 1 },
        '99999': { pwd: 'wrong', status: 0 }  // 禁用账号示例
    };
    let failCount = 0;  // 模拟连续失败锁定

    function showError(message, isShake = true) {
        errorTextSpan.innerText = message;
        errorBox.classList.remove('hidden');
        if (isShake) {
            const card = document.querySelector('.login-card');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
        }
    }

    function hideError() {
        errorBox.classList.add('hidden');
    }

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        hideError();

        const empNo = empNoInput.value.trim();
        const password = pwdInput.value;

        // 基础非空校验
        if (!empNo) {
            showError('工号不能为空，请填写');
            return;
        }
        if (!password) {
            showError('密码不能为空，请填写');
            return;
        }
        if (empNo.length < 6 || empNo.length > 20) {
            showError('工号长度需为 6-20 位字符');
            return;
        }

        // 模拟连续失败锁定机制 (连续5次失败锁定15分钟)
        const user = validUsers[empNo];
        if (!user || user.pwd !== password) {
            failCount++;
            let remain = 5 - failCount;
            if (failCount >= 5) {
                showError('账号已被锁定15分钟，连续5次登录失败', true);
                // 实际可禁用登录按钮一段时间，演示效果置灰按钮
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.style.opacity = '0.6';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    failCount = 0;
                    showError('锁定已解除，请重新尝试登录', false);
                }, 15000); // 演示15秒，实际15分钟
            } else {
                showError(`工号或密码错误，您还剩 ${remain} 次尝试机会`, true);
            }
            return;
        }

        // 账号状态校验
        if (user.status === 0) {
            showError('账号已禁用，请联系管理员', true);
            return;
        }

        // 登录成功，重置失败计数
        failCount = 0;
        // 模拟记住我功能 (存储至localStorage)
        if (rememberCheck.checked) {
            localStorage.setItem('savedEmpNo', empNo);
            localStorage.setItem('rememberFlag', 'true');
        } else {
            localStorage.removeItem('savedEmpNo');
            localStorage.removeItem('rememberFlag');
        }
        // 显示登录成功提示并跳转 (演示仅alert，真实应跳转首页)
        alert(`登录成功！欢迎 ${empNo}，即将跳转至仪表板。\n(演示环境，实际将根据角色进入首页)`);
        // 实际场景跳转: window.location.href = '/dashboard';
        // 此处为了演示体验，不清除页面；但按设计展示正确流程
        // 如果是真实集成，会跳转。我们简单重置表单并展示模拟跳转信息
        console.log('登录成功，JWT Token 已生成');
        // 可在此处刷新页面模拟跳转，但为了保留界面演示，仅提示
        // 按需求规格说明书，前端保存 Token 并跳转。
    });

    // 自动填充记住的工号（演示效果）
    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('savedEmpNo');
        const flag = localStorage.getItem('rememberFlag');
        if (flag === 'true' && saved) {
            empNoInput.value = saved;
            rememberCheck.checked = true;
        }
    });

    // 附加: 点击忘记密码提示(演示)
    document.querySelector('.forgot-link').addEventListener('click', (e) => {
        e.preventDefault();
        alert('请联系管理员重置密码，或通过预留手机找回。');
    });
</script>
</body>
</html>
